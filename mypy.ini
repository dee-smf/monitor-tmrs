[mypy]
# Exige que funções tenham tipos definidos (similar ao modo "basic" do Pyright)
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Avisa sobre retornos do tipo Any e checa condicionais de forma estrita
warn_return_any = True
warn_unused_ignores = True
no_implicit_optional = True
show_error_codes = True
